      - generic [ref=e169]:
        - heading "Frequently Asked Questions" [level=2] [ref=e170]
        - generic [ref=e171]:
          - generic [ref=e172]:
            - generic [ref=e174] [cursor=pointer]: Does this navigation update work for the Cadillac CUE system?
            - generic [ref=e175]: Yes, this update is fully compatible with 2014-2023 Cadillac models equipped with the CUE (Cadillac User Experience) infotainment system featuring embedded factory navigation (IO5, IO6, or IO8 versions).
          - generic [ref=e176]:
            - generic [ref=e178] [cursor=pointer]: How do I locate the SD card slot in my Cadillac?
            - generic [ref=e179]: In most modern Cadillac models, the SD card slot is hidden securely inside the center console storage bin, often situated right next to the auxiliary and USB data ports, or occasionally under a flip-up panel below the CUE screen.
          - generic [ref=e180]:
            - generic [ref=e182] [cursor=pointer]: Why are there two different part numbers (85713512 and 85856394) for Cadillacs?
            - generic [ref=e183]: General Motors utilized two different navigation hardware iterations during this period. You must verify the part number on your Cadillac's original SD card (either 85713512 for IO5/IO6 or 85856394 for IO8) to ensure you purchase the correct version.
          - generic [ref=e184]:
            - generic [ref=e186] [cursor=pointer]: Will updating the maps affect my Cadillac's other CUE features?
            - generic [ref=e187]: No, updating the navigation SD card only affects the map data and routing algorithms. It will not interfere with or change other CUE functionalities like audio, climate control, or vehicle settings.
