      - generic [ref=e438]:
        - heading "Frequently Asked Questions" [level=2] [ref=e439]
        - generic [ref=e440]:
          - generic [ref=e441]:
            - generic [ref=e443] [cursor=pointer]: What SD Card Do I Need for Nintendo Switch?
            - generic [ref=e444]: The Nintendo Switch requires a microSD, microSDHC, microSDXC card with Class 10 / UHS-I speed rating for reliable performance. We recommend 512GB capacity as the sweet spot balancing storage capacity with affordability. The device supports up to 2TB (theoretical), though most users find 512GB sufficient for daily use. Always choose from trusted brands like SanDisk, Lexar, or Kingston to ensure consistent performance and avoid data loss.
          - generic [ref=e445]:
            - generic [ref=e447] [cursor=pointer]: Does the Switch support cards larger than 1TB?
            - generic [ref=e448]: Theoretically yes, but practically 1TB is the maximum tested capacity. While Nintendo claims support for up to 2TB, no consumer cards larger than 1TB have been widely verified to work reliably with the Switch.
          - generic [ref=e449]:
            - generic [ref=e451] [cursor=pointer]: Can I use a phone's microSD card?
            - generic [ref=e452]: Yes, any microSD card works with Nintendo Switch. However, back up all phone data first before transferring, as formatting the card for Switch will erase all existing data.
          - generic [ref=e453]:
            - generic [ref=e455] [cursor=pointer]: Do I need V30 speed?
            - generic [ref=e456]: V30 is recommended but not required. Cheaper U1 or Class 10 cards will work fine for gaming, though V30 cards offer better reliability and consistency across your entire game library.
          - generic [ref=e457]:
            - generic [ref=e459] [cursor=pointer]: Is Class 10 / UHS-I required for Nintendo Switch?
            - generic [ref=e460]: Yes, Class 10 / UHS-I is recommended for Nintendo Switch. It guarantees a minimum sustained write speed of Not specified, which is necessary for stable recording without dropped frames or errors.
          - generic [ref=e461]:
            - generic [ref=e463] [cursor=pointer]: What storage capacity should I get for Nintendo Switch?
            - generic [ref=e464]: We recommend 128GB or 256GB or 512GB cards. A 128GB card is good for typical use, with 2TB (theoretical) as the maximum supported capacity (1TB tested and verified working). Larger sizes are useful if you shoot frequently and want to minimize card swaps.
          - generic [ref=e465]:
            - generic [ref=e467] [cursor=pointer]: Can I use older or slower cards with Nintendo Switch?
            - generic [ref=e468]: Not recommended. Cards slower than Class 10 / UHS-I may cause dropped frames, corrupted files, or recording failures. Always use Class 10 / UHS-I minimum for reliability.
          - generic [ref=e469]:
            - generic [ref=e471] [cursor=pointer]: Does the card type matter for Nintendo Switch?
            - generic [ref=e472]: Nintendo Switch accepts microSD, microSDHC, microSDXC. All types work the same, so choose based on price and availability. They have the same speed and capacity limits.
          - generic [ref=e473]:
            - generic [ref=e475] [cursor=pointer]: Does the brand matter for Nintendo Switch?
            - generic [ref=e476]: Yes, trusted brands like SanDisk, Lexar, and Kingston are recommended. Quality brands have better reliability and warranty support. Avoid unknown brands, especially for demanding devices.
          - generic [ref=e477]:
            - generic [ref=e479] [cursor=pointer]: What happens if I use the wrong card with Nintendo Switch?
            - generic [ref=e480]: "Using cards slower than Class 10 / UHS-I can cause: dropped frames during recording, corrupted files, or complete recording failure. Stick to Class 10 / UHS-I minimum to avoid data loss."
          - generic [ref=e481]:
            - generic [ref=e483] [cursor=pointer]: How long will an SD card last with Nintendo Switch?
            - generic [ref=e484]: Quality SD cards typically last 3-5 years with normal use. Replace your card if you experience read/write errors, corrupted files, or if it's been dropped or exposed to extreme conditions.
