      - generic [ref=e64]:
        - heading "Frequently Asked Questions" [level=2] [ref=e65]
        - generic [ref=e66]:
          - generic [ref=e67]:
            - generic [ref=e69] [cursor=pointer]: Do I have to pick 3 cards to use this tool?
            - generic [ref=e70]: No. Every slot is optional — compare just one card, two, or all three. Use the dropdown to add a card to any empty slot, and the × button on a filled slot to remove it.
          - generic [ref=e71]:
            - generic [ref=e73] [cursor=pointer]: What's the difference between UHS rating and Speed Class?
            - generic [ref=e74]: UHS (Ultra High Speed) describes the bus interface generation (UHS-I vs UHS-II), which caps the theoretical maximum transfer speed. Speed Class (like V30, V60, V90) is a guaranteed minimum sustained write speed, which is what actually matters for recording video without dropped frames.
          - generic [ref=e75]:
            - generic [ref=e77] [cursor=pointer]: Does a higher price always mean a better card?
            - generic [ref=e78]: Not necessarily. Price often reflects brand, capacity, and endurance rating (for cards that survive 24/7 dashcam or security camera recording) as much as raw speed. Check the specs side-by-side above rather than assuming price tier alone tells the full story.
          - generic [ref=e79]:
            - generic [ref=e81] [cursor=pointer]: Why don't I see car navigation SD cards in this tool?
            - generic [ref=e82]:
              - text: Navigation cards (the ones that update your car's built-in GPS maps) have a completely different spec sheet — map region and map year instead of speed class or UHS rating — so they aren't a fair side-by-side comparison against camera or device storage cards. Visit our
              - link "Car Navigation" [ref=e83] [cursor=pointer]:
                - /url: /cars/
              - text: section to compare those instead.
      - paragraph [ref=e84]: This website contains affiliate links. We may earn a small commission when you purchase through our links at no extra cost to you.
