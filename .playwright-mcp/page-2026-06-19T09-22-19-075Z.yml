            - heading "ONEXPLAYER 3 Redefines the Handheld Experience with Intel Arc G3 Extreme" [level=2] [ref=e65]
            - paragraph [ref=e66]: The handheld gaming PC market is evolving rapidly in 2026. Gamers no longer want portable devices that simply “run games.” They expect desktop-level performance, longer battery life, and the flexibility to handle gaming, entertainment, and productivity — all in one compact device.
            - paragraph [ref=e67]:
              - text: That’s exactly what
              - link "ONEXPLAYER 3" [ref=e68] [cursor=pointer]:
                - /url: https://www.indiegogo.com/en/projects/one-netbook/onexplayer-3-next-gen-3-in-1-ai-gaming-and-productivity-handheld
              - text: is built for.
            - paragraph [ref=e69]:
              - text: Powered by Intel’s all-new Arc G3 Extreme platform, this next-generation
              - link "handheld gaming PC" [ref=e70] [cursor=pointer]:
                - /url: https://onexplayerstore.com/collections/gaming-consoles
              - text: combines high-performance graphics, AI acceleration, advanced power efficiency, and a versatile three-in-one design to deliver a truly new portable computing experience.
            - 'heading "Arc G3 Extreme: High Performance Meets Power Efficiency" [level=3] [ref=e71]'
            - paragraph [ref=e72]:
              - text: At the core of
              - link "ONEXPLAYER 3" [ref=e73] [cursor=pointer]:
                - /url: https://www.indiegogo.com/en/projects/one-netbook/onexplayer-3-next-gen-3-in-1-ai-gaming-and-productivity-handheld
              - text: is Intel’s new Arc G3 Extreme processor, built on advanced 18A process technology. Compared with previous-generation platforms and competing high-performance solutions, the new architecture delivers stronger performance while significantly improving power efficiency and thermal management.
            - paragraph [ref=e74]: For handheld gamers, that means more than just higher frame rates. It means a quieter, cooler, and more stable experience during extended gaming sessions.
            - paragraph [ref=e75]:
              - text: Combined with an 85Wh high-capacity battery and a low-power architecture,
              - link "ONEXPLAYER 3" [ref=e76] [cursor=pointer]:
                - /url: https://www.indiegogo.com/en/projects/one-netbook/onexplayer-3-next-gen-3-in-1-ai-gaming-and-productivity-handheld
              - text: pushes handheld battery life even further, making AAA gaming, mobile productivity, and content creation more practical for longer periods without constantly searching for a charger.
            - paragraph [ref=e77]: Graphics performance also sees a major leap forward. Compared with the previous generation, the new Arc GPU delivers a 50%–77% performance improvement while supporting real-time ray tracing and Intel XeSS 3 multi-frame generation technology.
            - paragraph [ref=e78]: Powered by AI frame generation, XeSS 3 significantly boosts frame rates and overall smoothness, delivering a more fluid and responsive gaming experience even in demanding AAA titles at high settings.
            - paragraph [ref=e79]: Arc G3 Extreme also introduces a dedicated AI NPU engine. Unlike traditional AI workloads that rely heavily on the CPU or GPU, the standalone NPU handles AI tasks more efficiently with lower power consumption and reduced heat output. This helps prevent thermal throttling during intensive workloads, allowing gaming and AI processing to run simultaneously while maintaining stable performance.
            - paragraph [ref=e80]: AI capability across the platform has also been significantly upgraded, supporting up to 50 TOPS of NPU AI performance and 180 TOPS of total platform AI compute power. This provides stronger support for future AI gaming, AI-assisted content creation, and next-generation intelligent applications.
            - paragraph [ref=e81]
            - heading "8.8-Inch AMOLED Display with High Refresh Rate" [level=3] [ref=e82]
            - paragraph [ref=e83]:
              - link "ONEXPLAYER 3" [ref=e84] [cursor=pointer]:
                - /url: https://www.indiegogo.com/en/projects/one-netbook/onexplayer-3-next-gen-3-in-1-ai-gaming-and-productivity-handheld
              - text: features an 8.8-inch AMOLED display with a 144Hz refresh rate, HDR support, and VRR (Variable Refresh Rate) technology.
            - paragraph [ref=e85]: With vibrant colors, deep contrast, and smoother motion clarity, the display delivers a more immersive visual experience whether you’re gaming, streaming content, or working on creative projects.
            - heading "Advanced Cooling Designed for Extended Gaming Sessions" [level=3] [ref=e86]
            - paragraph [ref=e87]:
              - text: To maintain stable performance under sustained workloads,
              - link "ONEXPLAYER 3" [ref=e88] [cursor=pointer]:
                - /url: https://www.indiegogo.com/en/projects/one-netbook/onexplayer-3-next-gen-3-in-1-ai-gaming-and-productivity-handheld
              - text: uses a VC vapor chamber cooling system paired with high-speed PC-grade fans and upgraded thermal materials.
            - paragraph [ref=e89]: Even during demanding AAA gaming sessions, the system effectively reduces heat buildup and helps maintain quiet, stable, and consistent performance over long periods of use.
            - heading "A True Three-in-One Portable Gaming PC" [level=3] [ref=e90]:
              - text: A True Three-in-One
              - link "Portable Gaming PC" [ref=e91] [cursor=pointer]:
                - /url: https://onexplayerstore.com/collections/gaming-consoles
            - paragraph [ref=e92]:
              - link "ONEXPLAYER 3" [ref=e93] [cursor=pointer]:
                - /url: https://www.indiegogo.com/en/projects/one-netbook/onexplayer-3-next-gen-3-in-1-ai-gaming-and-productivity-handheld
              - text: is more than just a handheld gaming device.
            - paragraph [ref=e94]: With detachable controllers and a magnetic backlit keyboard, it can seamlessly switch between handheld, tablet, and mini laptop modes to adapt to different use cases.
            - paragraph [ref=e95]: The dedicated controller dock can also combine the left and right controllers into a full wireless gamepad, supporting Xbox 360 mode and multiplayer gaming experiences. Capacitive touch controls further improve navigation accuracy and make desktop interaction feel more natural and intuitive.
            - paragraph [ref=e96]:
              - text: Whether for gaming, entertainment, or mobile productivity,
              - link "ONEXPLAYER 3" [ref=e97] [cursor=pointer]:
                - /url: https://www.indiegogo.com/en/projects/one-netbook/onexplayer-3-next-gen-3-in-1-ai-gaming-and-productivity-handheld
              - text: is designed to deliver a more flexible portable experience.
