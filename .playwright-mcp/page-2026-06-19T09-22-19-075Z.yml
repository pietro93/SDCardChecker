            - heading "A New Direction for Handheld Gaming PCs" [level=3] [ref=e99]
            - paragraph [ref=e100]:
              - text: With the power of Intel Arc G3 Extreme, improved efficiency, advanced AI capabilities, and a flexible three-in-one design,
              - link "ONEXPLAYER 3" [ref=e101] [cursor=pointer]:
