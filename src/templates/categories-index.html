<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_TITLE}}</title>
  <meta name="description" content="{{PAGE_DESCRIPTION}}">
  <link rel="canonical" href="{{CATEGORIES_URL}}">
{{HREFLANG_TAGS}}

  <!-- Open Graph for Social Sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{PAGE_TITLE}}">
  <meta property="og:description" content="{{PAGE_DESCRIPTION}}">
  <meta property="og:image" content="https://sdcardchecker.com/img/og-category.webp">
  <meta property="og:url" content="{{CATEGORIES_URL}}">
  <meta property="og:site_name" content="SD Card Checker">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{PAGE_TITLE}}">
  <meta name="twitter:description" content="{{PAGE_DESCRIPTION}}">
  <meta name="twitter:image" content="https://sdcardchecker.com/img/og-category.webp">

  <!-- Breadcrumb Schema -->
  <script type="application/ld+json">
  {{BREADCRUMB_SCHEMA}}
  </script>

  <link rel="stylesheet" href="/assets/css/tailwind.css">
  <link rel="stylesheet" href="/assets/css/modern.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  {{GROW_SCRIPT}}
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100">
  {{HEADER}}

  <!-- Breadcrumb -->
  <div class="bg-white border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-4 py-3">
      <nav class="text-sm text-slate-600 flex items-center gap-2">
        <a href="{{HOME_URL}}" class="text-blue-600 hover:underline">{{HOME_LABEL}}</a>
        <i class="fas fa-chevron-right text-xs"></i>
        <span class="text-slate-900">{{BREADCRUMB_LABEL}}</span>
      </nav>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 py-12 flex flex-col md:flex-row gap-8">
    <main class="flex-1">
      <!-- Hero Section -->
      <div class="mb-12">
        <h1 class="text-4xl md:text-5xl font-bold text-slate-900 mb-4">
          {{HERO_TITLE}}
        </h1>
        <p class="text-lg text-slate-600 leading-relaxed max-w-2xl">
          {{HERO_SUBTITLE}}
        </p>
      </div>

      <!-- Categories Grid -->
      <section class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        {{CATEGORIES_GRID}}
      </section>
    </main>

    {{SIDEBAR}}
  </div>

  {{FOOTER}}

  <style>
    .category-card {
      @apply bg-white rounded-xl p-6 border border-slate-200 shadow-sm hover:shadow-lg hover:scale-105 transition-all;
    }

    .category-card:hover {
      @apply border-blue-300;
    }

    .category-card-icon {
      @apply w-16 h-16 mb-4 flex items-center justify-center bg-blue-50 rounded-lg;
    }

    .category-card-icon img {
      @apply w-10 h-10;
    }

    .category-card-title {
      @apply text-xl font-bold text-slate-900 mb-2;
    }

    .category-card-description {
      @apply text-sm text-slate-600 mb-4;
    }

    .category-card-link {
      @apply text-blue-600 hover:text-blue-700 font-semibold transition-colors inline-flex items-center gap-2;
    }

    .category-card-count {
      @apply text-xs text-slate-500 font-medium mt-4 pt-4 border-t border-slate-100;
    }
  </style>
</body>
</html>
